<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniBrowser — 标签页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:-apple-system,system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:375px;height:812px;background:#0D0D0D;border-radius:40px;border:2px solid #222;overflow:hidden;display:flex;flex-direction:column;position:relative}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;color:#666;font-size:12px;flex-shrink:0}
.status-bar .time{font-weight:600}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:16px;height:16px;fill:#666}
.header{height:48px;background:#141414;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.header .title{color:#F0F0F0;font-size:16px;font-weight:600}
.header .icons{display:flex;gap:16px;align-items:center}
.header .icons svg{width:22px;height:22px;fill:#666;cursor:pointer}
.header .close-icon svg{fill:#F0F0F0}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;overflow-y:auto;align-content:start}
.tab-card{background:#1A1A1A;border-radius:12px;overflow:hidden;position:relative}
.tab-card.active{border-left:2px solid #7C4DFF}
.tab-card.incognito{border-left:2px solid #FF4757}
.tab-preview{height:120px;background:#141414;display:flex;align-items:center;justify-content:center;font-size:28px;color:#666;font-weight:700}
.tab-card.incognito .tab-preview{background:#111}
.tab-card.incognito .tab-preview svg{width:32px;height:32px;fill:#FF4757}
.tab-label{padding:10px 12px;color:#F0F0F0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-close{position:absolute;top:6px;right:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:#666;font-size:14px;cursor:pointer;background:rgba(0,0,0,.4);border-radius:50%}
.fab{position:absolute;bottom:24px;right:20px;width:52px;height:52px;background:#7C4DFF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#FFF;font-weight:300}
.safe-bottom{height:34px;flex-shrink:0}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">10:30</span><div class="status-icons"><svg viewBox="0 0 24 24"><path d="M1 9l2 2a12.73 12.73 0 0118 0l2-2A15.57 15.57 0 001 9zm4 4l2 2a8.5 8.5 0 0110 0l2-2A11.36 11.36 0 005 13zm4 4l3 3 3-3a4.24 4.24 0 00-6 0z"/></svg><svg viewBox="0 0 24 24"><path d="M17 4h-3V2h-4v2H7v18h10V4z"/></svg></div></div>

  <div class="header">
    <span class="title">3 个标签页</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      <span class="close-icon"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#F0F0F0"/></svg></span>
    </div>
  </div>

  <div class="grid">
    <div class="tab-card active">
      <div class="tab-preview">G</div>
      <div class="tab-label">Google 搜索</div>
      <div class="tab-close">&times;</div>
    </div>
    <div class="tab-card">
      <div class="tab-preview">B</div>
      <div class="tab-label">百度一下</div>
      <div class="tab-close">&times;</div>
    </div>
    <div class="tab-card incognito">
      <div class="tab-preview"><svg viewBox="0 0 24 24"><path d="M12 7a5 5 0 015 5h2a7 7 0 00-14 0h2a5 5 0 015-5zm-1.21 9.9A2.99 2.99 0 019 14h-2a5 5 0 005 5c.34 0 .67-.04.99-.1a4.992 4.992 0 01-2.2-1.99zM17 14a3 3 0 01-3 3c-.34 0-.67-.04-.99-.1A4.97 4.97 0 0017 14h2a7 7 0 01-7 7 7 7 0 01-7-7h2c0 2.76 2.24 5 5 5s5-2.24 5-5h-2z"/><line x1="4" y1="4" x2="20" y2="20" stroke="#FF4757" stroke-width="2"/></svg></div>
      <div class="tab-label">无痕浏览</div>
      <div class="tab-close">&times;</div>
    </div>
  </div>

  <div class="fab">+</div>
  <div class="safe-bottom"></div>
</div>
</body>
</html>
