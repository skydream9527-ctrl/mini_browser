<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniBrowser — 视频</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:-apple-system,system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:375px;height:812px;background:#0D0D0D;border-radius:40px;border:2px solid #222;overflow:hidden;display:flex;flex-direction:column;position:relative}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;color:#666;font-size:12px;flex-shrink:0}
.status-bar .time{font-weight:600}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:16px;height:16px;fill:#666}
.header{height:48px;background:#141414;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.header .back{color:#F0F0F0;font-size:20px;cursor:pointer;background:none;border:none}
.header .title{color:#F0F0F0;font-size:16px;font-weight:600}
.seg-tabs{display:flex;height:44px;border-bottom:1px solid #2A2A2A;flex-shrink:0}
.seg-tab{flex:1;display:flex;align-items:center;justify-content:center;font-size:14px;color:#666;position:relative;cursor:pointer}
.seg-tab.active{color:#7C4DFF}
.seg-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#7C4DFF;border-radius:1px}
.section{padding:12px 16px}
.dl-item{background:#1A1A1A;border-radius:12px;padding:14px;margin-bottom:8px}
.dl-item .dl-title{color:#F0F0F0;font-size:14px;margin-bottom:10px}
.dl-row{display:flex;align-items:center;gap:10px}
.progress-track{flex:1;height:4px;background:#2A2A2A;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#7C4DFF;border-radius:2px}
.dl-pct{color:#666;font-size:12px;min-width:32px;text-align:right}
.dl-pause{width:28px;height:28px;background:none;border:1px solid #2A2A2A;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.dl-pause svg{width:14px;height:14px;fill:#666}
.sep{height:1px;background:#2A2A2A;margin:8px 0}
.completed-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.vid-card{background:#1A1A1A;border-radius:12px;overflow:hidden;position:relative}
.vid-thumb{height:100px;background:#141414;display:flex;align-items:center;justify-content:center}
.vid-thumb svg{width:32px;height:32px;fill:rgba(255,255,255,.6)}
.vid-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#F0F0F0;font-size:10px;padding:2px 6px;border-radius:4px}
.vid-card .vid-name{padding:8px 10px;color:#F0F0F0;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-bar{height:56px;background:#141414;border-top:1px solid #2A2A2A;display:flex;align-items:center;justify-content:space-around;flex-shrink:0}
.tab-bar .tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#666}
.tab-bar .tab.active{color:#7C4DFF}
.tab-bar .tab svg{width:22px;height:22px;fill:currentColor}
.tab-bar .tab .tab-circle{width:22px;height:22px;border-radius:6px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.safe-bottom{height:34px;background:#141414;flex-shrink:0}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">10:30</span><div class="status-icons"><svg viewBox="0 0 24 24"><path d="M1 9l2 2a12.73 12.73 0 0118 0l2-2A15.57 15.57 0 001 9zm4 4l2 2a8.5 8.5 0 0110 0l2-2A11.36 11.36 0 005 13zm4 4l3 3 3-3a4.24 4.24 0 00-6 0z"/></svg><svg viewBox="0 0 24 24"><path d="M17 4h-3V2h-4v2H7v18h10V4z"/></svg></div></div>

  <div class="header">
    <button class="back">&larr;</button>
    <span class="title">视频</span>
  </div>

  <div class="seg-tabs">
    <div class="seg-tab active">下载中 (2)</div>
    <div class="seg-tab">已完成 (3)</div>
  </div>

  <div class="section">
    <div class="dl-item">
      <div class="dl-title">技术分享 - Web开发入门.mp4</div>
      <div class="dl-row">
        <div class="progress-track"><div class="progress-fill" style="width:45%"></div></div>
        <span class="dl-pct">45%</span>
        <button class="dl-pause"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
      </div>
    </div>
    <div class="dl-item">
      <div class="dl-title">Python教程第三集.mp4</div>
      <div class="dl-row">
        <div class="progress-track"><div class="progress-fill" style="width:72%"></div></div>
        <span class="dl-pct">72%</span>
        <button class="dl-pause"><svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
      </div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="completed-grid">
    <div class="vid-card">
      <div class="vid-thumb"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="vid-badge">03:24</div>
      <div class="vid-name">设计系统讲解</div>
    </div>
    <div class="vid-card">
      <div class="vid-thumb"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="vid-badge">12:07</div>
      <div class="vid-name">Kotlin基础教程</div>
    </div>
    <div class="vid-card">
      <div class="vid-thumb"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="vid-badge">08:45</div>
      <div class="vid-name">Android架构解析</div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>首页</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/></svg><span>书签</span></div>
    <div class="tab"><div class="tab-circle">3</div><span>标签页</span></div>
    <div class="tab active"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span>视频</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg><span>菜单</span></div>
  </div>
  <div class="safe-bottom"></div>
</div>
</body>
</html>
