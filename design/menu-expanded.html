<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiniBrowser — 菜单展开</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:-apple-system,system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.phone{width:375px;height:812px;background:#0D0D0D;border-radius:40px;border:2px solid #222;overflow:hidden;display:flex;flex-direction:column;position:relative}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;color:#666;font-size:12px;flex-shrink:0}
.status-bar .time{font-weight:600}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:16px;height:16px;fill:#666}
.toolbar{height:48px;background:#141414;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.toolbar .nav-btn{color:#666;font-size:20px;width:32px;text-align:center;background:none;border:none}
.url-bar{flex:1;height:34px;background:#1A1A1A;border-radius:17px;display:flex;align-items:center;padding:0 14px;color:#F0F0F0;font-size:13px}
.toolbar .menu-btn{color:#666;font-size:20px;background:none;border:none;width:32px;text-align:center}
.progress{height:2px;background:#2A2A2A;flex-shrink:0}
.progress-fill{height:100%;width:60%;background:#7C4DFF}
.web-content{flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:16px}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:10}
.menu{position:absolute;top:96px;right:16px;width:200px;background:#1A1A1A;border-radius:12px;z-index:20;overflow:hidden;border:1px solid #2A2A2A}
.menu-item{height:44px;display:flex;align-items:center;padding:0 16px;gap:12px;color:#F0F0F0;font-size:14px;cursor:pointer}
.menu-item:not(:last-child){border-bottom:1px solid #2A2A2A}
.menu-item .mi{color:#666;font-size:16px;width:20px;text-align:center;flex-shrink:0}
.menu-item:hover{background:#222}
.tab-bar{height:56px;background:#141414;border-top:1px solid #2A2A2A;display:flex;align-items:center;justify-content:space-around;flex-shrink:0;position:relative;z-index:1}
.tab-bar .tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#666}
.tab-bar .tab svg{width:22px;height:22px;fill:currentColor}
.tab-bar .tab .tab-circle{width:22px;height:22px;border-radius:6px;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.safe-bottom{height:34px;background:#141414;flex-shrink:0;position:relative;z-index:1}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">10:30</span><div class="status-icons"><svg viewBox="0 0 24 24"><path d="M1 9l2 2a12.73 12.73 0 0118 0l2-2A15.57 15.57 0 001 9zm4 4l2 2a8.5 8.5 0 0110 0l2-2A11.36 11.36 0 005 13zm4 4l3 3 3-3a4.24 4.24 0 00-6 0z"/></svg><svg viewBox="0 0 24 24"><path d="M17 4h-3V2h-4v2H7v18h10V4z"/></svg></div></div>

  <div class="toolbar">
    <button class="nav-btn">&larr;</button>
    <button class="nav-btn">&rarr;</button>
    <div class="url-bar">example.com</div>
    <button class="menu-btn">&#8942;</button>
  </div>
  <div class="progress"><div class="progress-fill"></div></div>
  <div class="web-content">网页内容区域</div>

  <div class="overlay"></div>
  <div class="menu">
    <div class="menu-item"><span class="mi">&#9733;</span>收藏</div>
    <div class="menu-item"><span class="mi">&#8635;</span>刷新</div>
    <div class="menu-item"><span class="mi">&#9906;</span>搜索引擎</div>
    <div class="menu-item"><span class="mi">&#9776;</span>标签页 (3)</div>
    <div class="menu-item"><span class="mi">&#9654;</span>视频库</div>
    <div class="menu-item"><span class="mi">&#8599;</span>分享</div>
    <div class="menu-item"><span class="mi">&#9737;</span>已拦截 12</div>
    <div class="menu-item"><span class="mi">&#9783;</span>阅读模式</div>
    <div class="menu-item"><span class="mi">&#8981;</span>页面搜索</div>
    <div class="menu-item"><span class="mi">&#9109;</span>桌面模式</div>
    <div class="menu-item"><span class="mi">&#9112;</span>截图</div>
    <div class="menu-item"><span class="mi">&#9793;</span>翻译</div>
    <div class="menu-item"><span class="mi">&#9638;</span>画中画</div>
  </div>

  <div class="tab-bar">
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>首页</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/></svg><span>书签</span></div>
    <div class="tab"><div class="tab-circle">3</div><span>标签页</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><span>视频</span></div>
    <div class="tab"><svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg><span>菜单</span></div>
  </div>
  <div class="safe-bottom"></div>
</div>
</body>
</html>
